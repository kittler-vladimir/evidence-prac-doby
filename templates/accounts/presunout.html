{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block title %}Přesun zaměstnance{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow-sm">
      <div class="card-header"><strong>Přesunout – {{ employee.jmeno }}</strong></div>
      <div class="card-body">
        <p class="text-muted">Současné oddělení: <strong>{{ employee.oddeleni }}</strong></p>
        <form method="post">
          {% csrf_token %}
          {{ form|crispy }}
          <button type="submit" class="btn btn-primary">Přesunout</button>
          <a href="{% url 'accounts:seznam_zamestnancu' %}" class="btn btn-outline-secondary">Zpět</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
