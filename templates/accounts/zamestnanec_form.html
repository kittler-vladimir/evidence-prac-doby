{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block title %}{{ titulek }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-8">
    <div class="card shadow-sm">
      <div class="card-header"><strong>{{ titulek }}</strong></div>
      <div class="card-body">
        <form method="post">
          {% csrf_token %}
          {{ form|crispy }}
          <button type="submit" class="btn btn-primary">Uložit</button>
          <a href="{% url 'accounts:seznam_zamestnancu' %}" class="btn btn-outline-secondary">Zpět</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
